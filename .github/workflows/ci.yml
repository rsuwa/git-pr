name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y bats shellcheck
      - name: Syntax
        run: |
          bash -n git-pr
          bash -n install.sh
          bash -n test/test_helper.bash
      - name: ShellCheck
        run: shellcheck git-pr install.sh test/test_helper.bash
      - name: Tests
        run: bats test
