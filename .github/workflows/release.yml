name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y bats shellcheck
      - name: Syntax
        run: |
          bash -n git-pr
          bash -n install.sh
          bash -n test/test_helper.bash
      - name: ShellCheck
        run: shellcheck git-pr install.sh test/test_helper.bash
      - name: Tests
        run: bats test
      - name: Checksums
        run: sha256sum git-pr install.sh > SHA256SUMS
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" git-pr install.sh SHA256SUMS \
            --title "$GITHUB_REF_NAME" \
            --notes "See CHANGELOG.md for release notes."
